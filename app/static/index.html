<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="shopify-api-key" content="__SHOPIFY_CLIENT_ID__" />
    <meta name="theme-color" content="#0f6b4f" />
    <title>POS Bridge</title>
    <script src="https://cdn.shopify.com/shopifycloud/app-bridge.js"></script>
    <link rel="stylesheet" href="/assets/styles.css" />
    <script src="/assets/app.js" defer></script>
  </head>
  <body>
    <s-app-nav>
      <s-link href="/app" rel="home">Overview</s-link>
      <s-link href="/app/orders">Orders</s-link>
      <s-link href="/app/settings">Settings</s-link>
    </s-app-nav>

    <div class="shell">
      <header class="topbar">
        <a class="brand" href="/app" data-route aria-label="POS Bridge overview">
          <span class="brand-mark">PB</span>
          <span>
            <strong>POS Bridge</strong>
            <small>Inventory + orders</small>
          </span>
        </a>
        <nav class="tabs" aria-label="Main navigation">
          <a href="/app" data-route>Overview</a>
          <a href="/app/orders" data-route>Orders</a>
          <a href="/app/settings" data-route>Settings</a>
        </nav>
      </header>

      <main id="app" class="workspace" aria-live="polite">
        <section class="loading-card">
          <span class="spinner" aria-hidden="true"></span>
          <p>Checking your bridge…</p>
        </section>
      </main>
    </div>

    <div id="toast-region" class="toast-region" aria-live="assertive"></div>
  </body>
</html>
